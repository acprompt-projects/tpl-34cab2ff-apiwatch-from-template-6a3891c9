===
version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: apiwatch
      POSTGRES_USER: apiwatch
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apiwatch"]
      interval: 10s
      timeout: 5s
      retries: 5

  apiwatch:
    build:
      context: ..
      dockerfile: deployment-documentation/Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://apiwatch:${DB_PASSWORD:-changeme}@db:5432/apiwatch
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-60000}
      ENDPOINTS_CONFIG: /app/endpoints.json
    volumes:
      - ../endpoints.json:/app/endpoints.json:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata: