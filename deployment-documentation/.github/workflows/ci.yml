===
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: apiwatch_test
          POSTGRES_USER: apiwatch
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U apiwatch"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://apiwatch:testpass@localhost:5432/apiwatch_test
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test --if-present
        env:
          CI: true

      - name: Build Docker image
        run: |
          docker build \
            -f deployment-documentation/Dockerfile \
            -t apiwatch:ci-${{ github.sha }} \
            .

      - name: Sanity check image
        run: |
          docker run --rm -e NODE_ENV=production apiwatch:ci-${{ github.sha }} \
            node -e "console.log('Image OK')"